<script type="text/babel" data-presets="react">
  function ntBoot() {
    if (!window.NitroTraderDesignSystem_95e598 || !window.App) {
      var root = document.getElementById("root");
      if (root && !root.dataset.loading) {
        root.dataset.loading = "1";
        root.innerHTML = '<div style="height:100vh;display:grid;place-items:center;color:var(--text-tertiary);font:500 13px/1 var(--font-sans);letter-spacing:0.04em">loading…</div>';
      }
      if (!window.NitroTraderDesignSystem_95e598) {
        var s = document.createElement("script");
        s.src = "/_ds_bundle.js?t=" + Date.now();
        s.onload = ntBoot; s.onerror = function () { setTimeout(ntBoot, 600); };
        document.head.appendChild(s);
      } else {
        setTimeout(ntBoot, 200);
      }
      return;
    }
    var r = document.getElementById("root");
    (async function () {
      var ok = window.NT_AUTH_GATE ? await window.NT_AUTH_GATE() : true;
      if (!ok) { delete r.dataset.loading; return; }
      var live = window.NT_LIVE ? await window.NT_LIVE() : null;
      if (live) window.NT_DATA = live;
      delete r.dataset.loading; r.innerHTML = "";
      ReactDOM.createRoot(r).render(<App />);
      if (window.NT_REALTIME_START) window.NT_REALTIME_START();
    })();
  }
  ntBoot();
</script>
