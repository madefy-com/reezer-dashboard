<!-- @dsCard group="Colors" viewport="700x150" name="Brand · Electric violet" subtitle="The one accent — logo, focus, active nav, P&L line" -->
<!doctype html>
<html lang="en" data-theme="dark"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{margin:0;background:var(--bg-app);font-family:var(--font-sans);color:var(--text-primary)}
  .wrap{padding:20px;display:flex;gap:12px}
  .sw{flex:1;border-radius:var(--radius-md);border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column}
  .chip{height:64px}
  .meta{padding:9px 11px;display:flex;flex-direction:column;gap:2px;background:var(--surface-card)}
  .name{font:var(--w-medium) var(--t-xs)/1 var(--font-sans)}
  .hex{font:var(--w-regular) var(--t-2xs)/1 var(--font-mono);color:var(--text-tertiary);letter-spacing:0}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:var(--violet-400)"></div><div class="meta"><span class="name">violet-400</span><span class="hex">#8676F5</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--violet-500)"></div><div class="meta"><span class="name">violet-500 · brand</span><span class="hex">#6E5BF2</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--violet-600)"></div><div class="meta"><span class="name">violet-600 · hover</span><span class="hex">#5A47E0</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--violet-soft)"></div><div class="meta"><span class="name">violet-soft · ring</span><span class="hex">16% α</span></div></div>
</div></body></html>
