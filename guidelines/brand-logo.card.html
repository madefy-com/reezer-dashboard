<!doctype html>
<html lang="en" data-theme="dark"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{margin:0;background:var(--bg-app);font-family:var(--font-sans);color:var(--text-primary)}
  .wrap{padding:26px;display:flex;align-items:center;gap:34px}
  .lockup{display:flex;align-items:center;gap:14px}
  .word{font:var(--w-semibold) 26px/1 var(--font-sans);letter-spacing:var(--ls-tight)}
  .word b{color:var(--accent);font-weight:var(--w-semibold)}
  .col{display:flex;flex-direction:column;gap:6px}
  .cap{font:var(--w-medium) var(--t-2xs)/1 var(--font-sans);letter-spacing:var(--ls-wide);text-transform:uppercase;color:var(--text-tertiary)}
  .bolts{display:flex;gap:16px;align-items:center}
  .bolt{color:var(--accent)}
  .onlight{background:#F6F6F8;padding:8px;border-radius:14px;display:flex}
</style></head>
<body><div class="wrap">
  <div class="col">
    <div class="lockup"><img src="../assets/logo-mark.png" width="56" height="56"/><span class="word">Reezer</span></div>
    <span class="cap">primary lockup</span>
  </div>
  <div class="col">
    <div class="bolts">
      <img src="../assets/logo-mark.png" width="40" height="40"/>
      <div class="onlight"><img src="../assets/logo-mark.png" width="32" height="32"/></div>
      <img src="../assets/logo-mark.png" width="24" height="24"/>
    </div>
    <span class="cap">mark · on-light · sizes</span>
  </div>
</div></body></html>
