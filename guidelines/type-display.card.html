<!-- @dsCard group="Type" viewport="700x180" name="Display & metric — Geist Light" subtitle="Big, light-weight numbers — the hero look" -->
<!doctype html>
<html lang="en" data-theme="dark"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{margin:0;background:var(--bg-app);font-family:var(--font-sans);color:var(--text-primary)}
  .wrap{padding:24px;display:flex;align-items:baseline;gap:28px;flex-wrap:wrap}
  .big{font:var(--w-light) var(--t-display)/1 var(--font-mono);font-variant-numeric:tabular-nums;letter-spacing:var(--ls-tight)}
  .col{display:flex;flex-direction:column;gap:6px}
  .h1{font:var(--w-semibold) var(--t-h1)/1.1 var(--font-sans);letter-spacing:var(--ls-snug)}
  .h2{font:var(--w-semibold) var(--t-h2)/1.15 var(--font-sans);letter-spacing:var(--ls-snug)}
  .cap{font:var(--w-medium) var(--t-2xs)/1 var(--font-sans);letter-spacing:var(--ls-wide);text-transform:uppercase;color:var(--text-tertiary)}
</style></head>
<body><div class="wrap">
  <div class="col"><span class="cap">net p&l · display 52 / 300</span><span class="big" style="color:var(--profit)">+$2,840</span></div>
  <div class="col">
    <span class="h1">Win rate 62%</span>
    <span class="h2">Net realized P&L</span>
    <span class="cap">heading 30 · 22 / 600 semibold</span>
  </div>
</div></body></html>
