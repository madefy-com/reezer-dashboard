<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="8px base grid" -->
<!doctype html>
<html lang="en" data-theme="dark"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{margin:0;background:var(--bg-app);font-family:var(--font-sans);color:var(--text-primary)}
  .wrap{padding:22px;display:flex;flex-direction:column;gap:9px}
  .r{display:flex;align-items:center;gap:14px}
  .bar{height:14px;background:var(--violet-soft);border-left:2px solid var(--violet-500);border-radius:2px}
  .name{font:var(--w-medium) var(--t-xs)/1 var(--font-sans);color:var(--text-secondary);width:64px}
  .val{font:var(--w-regular) var(--t-2xs)/1 var(--font-mono);color:var(--text-tertiary);width:38px;text-align:right}
</style></head>
<body><div class="wrap">
  <div class="r"><span class="name">space-1</span><span class="val">4</span><div class="bar" style="width:4px"></div></div>
  <div class="r"><span class="name">space-2</span><span class="val">8</span><div class="bar" style="width:8px"></div></div>
  <div class="r"><span class="name">space-3</span><span class="val">12</span><div class="bar" style="width:12px"></div></div>
  <div class="r"><span class="name">space-4</span><span class="val">16</span><div class="bar" style="width:16px"></div></div>
  <div class="r"><span class="name">space-6</span><span class="val">24</span><div class="bar" style="width:24px"></div></div>
  <div class="r"><span class="name">space-8</span><span class="val">32</span><div class="bar" style="width:32px"></div></div>
  <div class="r"><span class="name">space-12</span><span class="val">48</span><div class="bar" style="width:48px"></div></div>
</div></body></html>
